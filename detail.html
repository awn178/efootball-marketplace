<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Account Details - eFootball Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
            color: white;
            min-height: 100vh;
        }
        header {
            background: linear-gradient(90deg, #4CAF50, #2196F3);
            padding: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .container {
            padding: 16px;
            max-width: 800px;
            margin: 0 auto;
        }
        .back-btn {
            background: #1e2a3a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 16px;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        
        /* Screenshots */
        .screenshots-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }
        .screenshot-card {
            background: #16213e;
            border-radius: 16px;
            padding: 16px;
            border: 1px solid #2a3a5a;
        }
        .screenshot-title {
            color: #4CAF50;
            font-size: 14px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .squad-image {
            width: 100%;
            border-radius: 12px;
            border: 1px solid #2a3a5a;
        }
        
        /* Info Card */
        .info-card {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a3a5a;
            margin-bottom: 24px;
        }
        .price-tag {
            font-size: 28px;
            font-weight: 700;
            color: #FFD700;
            margin-bottom: 16px;
        }
        .info-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 20px;
        }
        .info-item {
            background: #1e2a3a;
            padding: 12px;
            border-radius: 10px;
        }
        .info-label {
            color: #8892b0;
            font-size: 11px;
            margin-bottom: 4px;
        }
        .info-value {
            font-weight: 600;
            font-size: 14px;
        }
        
        /* Featured Players */
        .featured-players {
            margin-bottom: 20px;
        }
        .featured-title {
            color: #4CAF50;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .players-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .player-tag {
            background: #1e2a3a;
            border: 1px solid #4CAF50;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 13px;
            color: #4CAF50;
        }
        
        /* Special Skills */
        .skills-section {
            margin-bottom: 20px;
        }
        .skills-title {
            color: #4CAF50;
            font-size: 14px;
            margin-bottom: 12px;
        }
        .skills-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .skill-tag {
            background: #1e2a3a;
            padding: 6px 12px;
            border-radius: 15px;
            font-size: 11px;
            color: #FFD700;
            border: 1px solid #FFD700;
        }
        
        /* Contact Seller */
        .contact-section {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #4CAF50;
            margin-bottom: 24px;
        }
        .seller-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .seller-username {
            color: #4CAF50;
            font-weight: 600;
        }
        .contact-btn {
            background: #4CAF50;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }
        
        /* Trusted Admins */
        .admins-section {
            background: #16213e;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #2a3a5a;
        }
        .admins-title {
            color: #4CAF50;
            font-size: 16px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .admins-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .admin-card {
            background: #1e2a3a;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .admin-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #4CAF50;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 18px;
        }
        .admin-info {
            flex: 1;
        }
        .admin-name {
            font-weight: 600;
            font-size: 14px;
            color: #4CAF50;
        }
        .admin-telegram {
            font-size: 12px;
            color: #8892b0;
        }
        .admin-payment {
            font-size: 11px;
            color: #FFD700;
            margin-top: 2px;
        }
        .admin-contact {
            background: #2196F3;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
        }
        
        .loading {
            text-align: center;
            color: #8892b0;
            padding: 40px;
        }
        .footer {
            text-align: center;
            padding: 20px 16px;
            color: #8892b0;
            border-top: 1px solid #2a3a5a;
            margin-top: 20px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        🛒 eFOOTBALL MARKETPLACE
    </header>

    <div class="container">
        <button class="back-btn" onclick="goBack()">← BACK TO MARKETPLACE</button>

        <div id="loading" class="loading">Loading account details...</div>

        <div id="content" style="display: none;">
            <!-- Screenshots -->
            <div class="screenshots-container">
                <div class="screenshot-card">
                    <div class="screenshot-title">⚽ MAIN SQUAD</div>
                    <img id="mainSquad" class="squad-image" src="" alt="Main Squad">
                </div>
                <div class="screenshot-card">
                    <div class="screenshot-title">🔄 OVERBENCH</div>
                    <img id="overbench" class="squad-image" src="" alt="Overbench Squad">
                </div>
            </div>

            <!-- Account Info -->
            <div class="info-card">
                <div class="price-tag" id="price"></div>
                
                <div class="info-grid">
                    <div class="info-item">
                        <div class="info-label">🪙 COINS</div>
                        <div class="info-value" id="coins"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🔄 TRADE TYPE</div>
                        <div class="info-value" id="tradeType"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">🔗 LINK TYPE</div>
                        <div class="info-value" id="linkType"></div>
                    </div>
                    <div class="info-item">
                        <div class="info-label">📅 POSTED</div>
                        <div class="info-value" id="postedDate"></div>
                    </div>
                </div>

                <!-- Featured Players -->
                <div class="featured-players">
                    <div class="featured-title">⭐ FEATURED PLAYERS</div>
                    <div class="players-list" id="featuredPlayers"></div>
                </div>

                <!-- Special Skills -->
                <div class="skills-section">
                    <div class="skills-title">✨ SPECIAL SKILLS</div>
                    <div class="skills-grid" id="specialSkills"></div>
                </div>
            </div>

            <!-- Contact Seller -->
            <div class="contact-section">
                <div class="seller-info">
                    <div>
                        <div style="color: #8892b0; font-size: 12px;">SELLER</div>
                        <div class="seller-username" id="sellerUsername"></div>
                    </div>
                    <a id="contactSellerBtn" class="contact-btn" target="_blank">📱 CONTACT SELLER</a>
                </div>
            </div>

            <!-- Trusted Admins -->
            <div class="admins-section">
                <div class="admins-title">🛡️ TRUSTED ADMINS</div>
                <div class="admins-list" id="adminsList"></div>
                <p style="color: #8892b0; font-size: 11px; margin-top: 12px;">
                    Contact admins for secure transactions
                </p>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2026 eFootball Marketplace | Buy & Sell Accounts
    </div>

    <script>
        // Get listing ID from URL
        const pathParts = window.location.pathname.split('/');
        const listingId = pathParts[pathParts.length - 1];

        // Go back function
        function goBack() {
            window.location.href = '/';
        }

        // Load listing details
        async function loadListing() {
            try {
                const res = await fetch(`/api/listing/${listingId}`);
                const data = await res.json();
                
                if (!data.success && data.message) {
                    alert('Listing not found');
                    goBack();
                    return;
                }

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                // Set screenshots
                document.getElementById('mainSquad').src = data.main_screenshot;
                document.getElementById('overbench').src = data.overbench_screenshot;

                // Set basic info
                document.getElementById('price').textContent = `💰 ${data.price} ETB`;
                document.getElementById('coins').textContent = data.coin_amount > 0 ? `${data.coin_amount} Coins` : 'No Coins';
                document.getElementById('tradeType').textContent = data.trade_type;
                document.getElementById('linkType').textContent = data.link_type;
                document.getElementById('postedDate').textContent = new Date(data.created).toLocaleDateString();
                document.getElementById('sellerUsername').textContent = data.seller;

                // Set contact seller button
                document.getElementById('contactSellerBtn').href = `https://t.me/${data.seller.replace('@', '')}`;

                // Set featured players
                const featuredDiv = document.getElementById('featuredPlayers');
                if (data.featured_players && data.featured_players.length > 0) {
                    featuredDiv.innerHTML = data.featured_players.map(p => 
                        `<span class="player-tag">${p}</span>`
                    ).join('');
                } else {
                    featuredDiv.innerHTML = '<span style="color: #8892b0;">No featured players</span>';
                }

                // Set special skills
                const skillsDiv = document.getElementById('specialSkills');
                if (data.special_skills && data.special_skills.length > 0) {
                    skillsDiv.innerHTML = data.special_skills.map(s => 
                        `<span class="skill-tag">✨ ${s}</span>`
                    ).join('');
                } else {
                    skillsDiv.innerHTML = '<span style="color: #8892b0;">No special skills</span>';
                }

                // Set trusted admins
                const adminsDiv = document.getElementById('adminsList');
                if (data.trusted_admins && data.trusted_admins.length > 0) {
                    adminsDiv.innerHTML = data.trusted_admins.map(a => `
                        <div class="admin-card">
                            <div class="admin-avatar">${a.name.charAt(0)}</div>
                            <div class="admin-info">
                                <div class="admin-name">${a.name}</div>
                                <div class="admin-telegram">${a.telegram}</div>
                                <div class="admin-payment">${a.payment || 'Bank Transfer / TeleBirr'}</div>
                            </div>
                            <a href="https://t.me/${a.telegram.replace('@', '')}" target="_blank" class="admin-contact">CONTACT</a>
                        </div>
                    `).join('');
                } else {
                    adminsDiv.innerHTML = '<p style="color: #8892b0;">No admins available</p>';
                }

            } catch (e) {
                console.error('Error:', e);
                alert('Error loading listing');
                goBack();
            }
        }

        // Load on page load
        loadListing();
    </script>
</body>
</html>

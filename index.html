<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>eFootball Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            color: #f3f4f6;
            min-height: 100vh;
        }
        header {
            background: #1f2937;
            padding: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid #374151;
            color: #f3f4f6;
        }
        .container {
            padding: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Login Section */
        .login-section {
            background: #1f2937;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #374151;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }
        .login-section h2 {
            color: #2563eb;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .login-input {
            width: 100%;
            padding: 14px;
            background: #374151;
            border: 1px solid #4b5563;
            color: #f3f4f6;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.2s;
        }
        .login-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
        .login-input[readonly] {
            background: #2d3748;
            color: #10b981;
            font-weight: 500;
            border-color: #10b981;
        }
        .login-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #1d4ed8;
        }
        .login-btn.secondary {
            background: #374151;
            color: #f3f4f6;
            margin-top: 8px;
        }
        .login-btn.secondary:hover {
            background: #4b5563;
        }
        
        /* User Info */
        .user-info {
            background: #1f2937;
            padding: 16px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border: 1px solid #374151;
        }
        .username-badge {
            color: #10b981;
            font-weight: 600;
            font-size: 15px;
        }
        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .logout-btn:hover {
            background: #b91c1c;
        }
        
        /* Navigation Tabs */
        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            background: #1f2937;
            padding: 8px;
            border-radius: 30px;
            border: 1px solid #374151;
        }
        .tab {
            padding: 10px 16px;
            border-radius: 25px;
            cursor: pointer;
            background: #374151;
            color: #9ca3af;
            font-weight: 600;
            font-size: 13px;
            flex: 1;
            text-align: center;
            transition: all 0.2s;
        }
        .tab.active {
            background: #2563eb;
            color: white;
        }
        
        /* Sell Button */
        .sell-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 10px;
            font-weight: 700;
            font-size: 16px;
            margin-bottom: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .sell-btn:hover {
            background: #059669;
        }
        
        /* Search Bar */
        .search-container {
            margin-bottom: 20px;
        }
        .search-input {
            width: 100%;
            padding: 14px;
            background: #374151;
            border: 1px solid #4b5563;
            color: #f3f4f6;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
        }
        .search-input:focus {
            outline: none;
            border-color: #2563eb;
        }
        
        /* Listing Grid */
        .listings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .listing-card {
            background: #1f2937;
            border-radius: 16px;
            overflow: hidden;
            border: 1px solid #374151;
            cursor: pointer;
            transition: transform 0.2s, border-color 0.2s;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .listing-card:hover {
            transform: translateY(-4px);
            border-color: #2563eb;
        }
        
        /* Squad Screenshot */
        .squad-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-bottom: 1px solid #374151;
        }
        
        /* Tags Container */
        .tags-container {
            padding: 16px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .tag-price {
            background: #10b981;
            color: white;
        }
        .tag-sale {
            background: #2563eb;
            color: white;
        }
        .tag-exchange {
            background: #8b5cf6;
            color: white;
        }
        .tag-both {
            background: #f59e0b;
            color: white;
        }
        .tag-coin {
            background: #f59e0b;
            color: white;
        }
        .tag-link {
            background: #6b7280;
            color: white;
        }
        
        /* Loading & Empty States */
        .loading {
            text-align: center;
            color: #9ca3af;
            padding: 40px;
            font-size: 14px;
        }
        .no-listings {
            text-align: center;
            color: #9ca3af;
            padding: 40px;
            background: #1f2937;
            border-radius: 16px;
            border: 1px solid #374151;
        }
        
        /* Footer */
        .footer {
            text-align: center;
            padding: 24px 16px;
            color: #9ca3af;
            border-top: 1px solid #374151;
            margin-top: 30px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <header>
        🛒 eFOOTBALL MARKETPLACE
    </header>

    <div class="container">
        <!-- Login Section -->
        <div class="login-section" id="loginSection">
            <h2>🔐 LOGIN / REGISTER</h2>
            <div class="input-group">
                <label>Telegram Username</label>
                <input type="text" id="telegramUsername" class="login-input" placeholder="@username" readonly>
            </div>
            <div class="input-group">
                <label>PIN (4-6 digits)</label>
                <input type="password" id="pin" class="login-input" placeholder="••••" maxlength="6">
            </div>
            <button class="login-btn" onclick="login()">LOGIN</button>
            <button class="login-btn secondary" onclick="register()">REGISTER</button>
            <p style="color: #9ca3af; font-size: 12px; margin-top: 16px; text-align: center;">
                Your Telegram username is auto-filled from the bot
            </p>
        </div>

        <!-- User Info (after login) -->
        <div class="user-info" id="userInfo" style="display: none;">
            <div>
                <span class="username-badge" id="displayUsername"></span>
                <span id="sellerBadge" style="background: #10b981; color: white; padding: 3px 8px; border-radius: 12px; margin-left: 8px; font-size: 10px; display: none;">SELLER</span>
            </div>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>

        <!-- Tabs (after login) -->
        <div class="tabs" id="tabs" style="display: none;">
            <div class="tab active" onclick="switchTab('feed')">🛒 MARKETPLACE</div>
            <div class="tab" onclick="switchTab('mylistings')">📋 MY LISTINGS</div>
        </div>

        <!-- SELL BUTTON -->
        <button class="sell-btn" onclick="goToSell()" id="sellBtn" style="display: none;">
            ➕ SELL ACCOUNT
        </button>

        <!-- SEARCH BAR -->
        <div class="search-container">
            <input type="text" class="search-input" placeholder="Search by player name..." id="searchInput" onkeyup="searchListings()">
        </div>

        <!-- MAIN FEED SECTION -->
        <div id="feed-section" class="section active">
            <div id="listingsGrid" class="listings-grid">
                <div class="loading">Loading listings...</div>
            </div>
        </div>

        <!-- MY LISTINGS SECTION -->
        <div id="mylistings-section" class="section">
            <div id="myListingsGrid" class="listings-grid">
                <div class="loading">Loading your listings...</div>
            </div>
        </div>
    </div>

    <div class="footer">
        © 2026 eFootball Marketplace | Buy & Sell Accounts
    </div>

    <script>
        // Telegram Web App
        let tg = window.Telegram?.WebApp;
        let userId = null;
        let username = null;
        let isSeller = false;

        // Initialize Telegram
        function initTelegram() {
            if (tg) {
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    const usernameField = document.getElementById('telegramUsername');
                    if (usernameField) {
                        if (user.username) {
                            usernameField.value = '@' + user.username;
                        } else if (user.first_name) {
                            usernameField.value = '@' + user.first_name.toLowerCase().replace(/\s+/g, '');
                        }
                        usernameField.readOnly = true;
                        usernameField.style.background = '#2d3748';
                    }
                    
                    window.telegramUser = {
                        id: user.id,
                        username: user.username ? '@' + user.username : null,
                        first_name: user.first_name
                    };
                }
            }
        }

        // Initialize
        function init() {
            initTelegram();
            
            const savedUser = localStorage.getItem('username');
            const savedId = localStorage.getItem('userId');
            
            if (savedUser && savedId) {
                username = savedUser;
                userId = savedId;
                showLoggedIn();
                loadListings();
            }
        }

        // Register
        async function register() {
            let telegramUsername = document.getElementById('telegramUsername').value.trim();
            const pin = document.getElementById('pin').value.trim();
            
            if (!telegramUsername) {
                alert('Please enter Telegram username');
                return;
            }
            
            if (!pin || pin.length < 4 || pin.length > 6) {
                alert('PIN must be 4-6 digits');
                return;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        telegram_username: telegramUsername,
                        pin: pin
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    userId = data.user_id;
                    username = data.username;
                    
                    localStorage.setItem('userId', userId);
                    localStorage.setItem('username', username);
                    
                    showLoggedIn();
                    loadListings();
                } else {
                    alert('Registration failed: ' + data.message);
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        // Login
        async function login() {
            let telegramUsername = document.getElementById('telegramUsername').value.trim();
            const pin = document.getElementById('pin').value.trim();
            
            if (!telegramUsername || !pin) {
                alert('Please enter username and PIN');
                return;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        telegram_username: telegramUsername,
                        pin: pin
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    userId = data.user_id;
                    username = data.username;
                    
                    localStorage.setItem('userId', userId);
                    localStorage.setItem('username', username);
                    
                    showLoggedIn();
                    loadListings();
                } else {
                    alert('Login failed: ' + data.message);
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        // Show logged in state
        function showLoggedIn() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('tabs').style.display = 'flex';
            document.getElementById('sellBtn').style.display = 'block';
            document.getElementById('displayUsername').textContent = username;
        }

        // Logout
        function logout() {
            localStorage.clear();
            location.reload();
        }

        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            event.target.classList.add('active');
            
            if (tab === 'feed') {
                document.getElementById('feed-section').classList.add('active');
                loadListings();
            } else {
                document.getElementById('mylistings-section').classList.add('active');
                loadMyListings();
            }
        }

        // Go to sell page
        function goToSell() {
            window.location.href = '/post';
        }

        // Load all listings
        async function loadListings() {
            try {
                const res = await fetch('/api/listings');
                const listings = await res.json();
                
                const grid = document.getElementById('listingsGrid');
                
                if (!listings || listings.length === 0) {
                    grid.innerHTML = '<div class="no-listings">No accounts for sale yet</div>';
                    return;
                }
                
                let html = '';
                listings.forEach(l => {
                    let tradeClass = 'tag-sale';
                    let tradeText = 'FOR SALE';
                    if (l.trade_type === 'FOR EXCHANGE') {
                        tradeClass = 'tag-exchange';
                        tradeText = '🔄 EXCHANGE';
                    } else if (l.trade_type === 'SALE & EXCHANGE') {
                        tradeClass = 'tag-both';
                        tradeText = '🔄💰 SALE/EXCHANGE';
                    }
                    
                    let coinText = l.coin_amount > 0 ? `🪙 ${l.coin_amount} COINS` : '🪙 NO COIN';
                    
                    html += `
                        <div class="listing-card" onclick="viewListing(${l.id})">
                            <img src="${l.main_screenshot}" class="squad-image" alt="Squad">
                            <div class="tags-container">
                                <span class="tag tag-price">💰 ${l.price} ETB</span>
                                <span class="tag ${tradeClass}">${tradeText}</span>
                                <span class="tag tag-coin">${coinText}</span>
                                <span class="tag tag-link">${l.link_type}</span>
                            </div>
                        </div>
                    `;
                });
                
                grid.innerHTML = html;
                
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('listingsGrid').innerHTML = '<div class="no-listings">Error loading listings</div>';
            }
        }

        // Load my listings
        async function loadMyListings() {
            try {
                const res = await fetch('/api/listings');
                const listings = await res.json();
                
                const myListings = listings.filter(l => l.seller === username);
                
                const grid = document.getElementById('myListingsGrid');
                
                if (myListings.length === 0) {
                    grid.innerHTML = '<div class="no-listings">You have no listings</div>';
                    return;
                }
                
                let html = '';
                myListings.forEach(l => {
                    let tradeClass = 'tag-sale';
                    let tradeText = 'FOR SALE';
                    if (l.trade_type === 'FOR EXCHANGE') {
                        tradeClass = 'tag-exchange';
                        tradeText = '🔄 EXCHANGE';
                    } else if (l.trade_type === 'SALE & EXCHANGE') {
                        tradeClass = 'tag-both';
                        tradeText = '🔄💰 SALE/EXCHANGE';
                    }
                    
                    let coinText = l.coin_amount > 0 ? `🪙 ${l.coin_amount} COINS` : '🪙 NO COIN';
                    
                    html += `
                        <div class="listing-card" onclick="viewListing(${l.id})">
                            <img src="${l.main_screenshot}" class="squad-image" alt="Squad">
                            <div class="tags-container">
                                <span class="tag tag-price">💰 ${l.price} ETB</span>
                                <span class="tag ${tradeClass}">${tradeText}</span>
                                <span class="tag tag-coin">${coinText}</span>
                            </div>
                        </div>
                    `;
                });
                
                grid.innerHTML = html;
                
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('myListingsGrid').innerHTML = '<div class="no-listings">Error loading listings</div>';
            }
        }

        // Search listings
        function searchListings() {
            const query = document.getElementById('searchInput').value.toLowerCase();
        }

        // View listing detail
        function viewListing(id) {
            window.location.href = `/detail/${id}`;
        }

        // Initialize on load
        init();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>eFootball Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            color: #f3f4f6;
            min-height: 100vh;
        }
        header {
            background: #1f2937;
            padding: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-bottom: 1px solid #374151;
        }
        .container {
            padding: 16px;
            max-width: 1200px;
            margin: 0 auto;
        }
        
        /* Login Section */
        .login-section {
            background: #1f2937;
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 20px;
            border: 1px solid #374151;
        }
        .login-section h2 {
            color: #2563eb;
            margin-bottom: 20px;
            font-size: 18px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 6px;
            font-weight: 500;
        }
        .login-input {
            width: 100%;
            padding: 14px;
            background: #374151;
            border: 1px solid #4b5563;
            color: #f3f4f6;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
        }
        .login-input:focus {
            outline: none;
            border-color: #2563eb;
        }
        .login-input[readonly] {
            background: #2d3748;
            color: #10b981;
            font-weight: 500;
        }
        .username-edit {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .username-edit input {
            flex: 1;
        }
        .edit-toggle {
            background: #374151;
            color: #f3f4f6;
            border: 1px solid #4b5563;
            padding: 12px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
        }
        .edit-toggle:hover {
            background: #4b5563;
        }
        .login-btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px;
            width: 100%;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
        }
        .login-btn.secondary {
            background: #374151;
            margin-top: 8px;
        }
        
        /* Rest of your existing CSS remains the same */
        .user-info { /* ... */ }
        .tabs { /* ... */ }
        .listings-grid { /* ... */ }
        .listing-card { /* ... */ }
        .tags-container { /* ... */ }
        .tag { /* ... */ }
        
    </style>
</head>
<body>
    <header>
        🛒 eFOOTBALL MARKETPLACE
    </header>

    <div class="container">
        <!-- Login Section -->
        <div class="login-section" id="loginSection">
            <h2>🔐 LOGIN / REGISTER</h2>
            <div class="input-group">
                <label>Telegram Username</label>
                <div class="username-edit">
                    <input type="text" id="telegramUsername" class="login-input" placeholder="@username">
                    <button class="edit-toggle" onclick="toggleUsernameEdit()" id="editToggleBtn">✏️ Edit</button>
                </div>
                <p style="color: #9ca3af; font-size: 11px; margin-top: 5px;" id="usernameHint">Auto-filled from Telegram. Click edit to change.</p>
            </div>
            <div class="input-group">
                <label>PIN (4-6 digits)</label>
                <input type="password" id="pin" class="login-input" placeholder="••••" maxlength="6">
            </div>
            <button class="login-btn" onclick="login()" id="loginBtn">LOGIN</button>
            <button class="login-btn secondary" onclick="register()" id="registerBtn">REGISTER</button>
        </div>

        <!-- User Info (after login) -->
        <div class="user-info" id="userInfo" style="display: none;">
            <div>
                <span class="username-badge" id="displayUsername"></span>
            </div>
            <button class="logout-btn" onclick="logout()">LOGOUT</button>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="tabs" style="display: none;">
            <div class="tab active" onclick="switchTab('feed')">🛒 MARKETPLACE</div>
            <div class="tab" onclick="switchTab('mylistings')">📋 MY LISTINGS</div>
        </div>

        <!-- SELL BUTTON -->
        <button class="sell-btn" onclick="goToSell()" id="sellBtn" style="display: none;">
            ➕ SELL ACCOUNT
        </button>

        <!-- MAIN FEED -->
        <div id="feed-section" class="section active">
            <div id="listingsGrid" class="listings-grid">
                <div class="loading">Loading listings...</div>
            </div>
        </div>

        <!-- MY LISTINGS -->
        <div id="mylistings-section" class="section">
            <div id="myListingsGrid" class="listings-grid">
                <div class="loading">Loading your listings...</div>
            </div>
        </div>
    </div>

    <script>
        // Telegram Web App
        let tg = window.Telegram?.WebApp;
        let userId = null;
        let username = null;
        let isAdmin = false;
        let telegramUser = null;

        // Initialize Telegram
        function initTelegram() {
            if (tg) {
                tg.ready();
                tg.expand();
                
                const user = tg.initDataUnsafe?.user;
                if (user) {
                    telegramUser = user;
                    const usernameField = document.getElementById('telegramUsername');
                    
                    // Auto-fill with Telegram username
                    if (user.username) {
                        usernameField.value = '@' + user.username;
                    } else if (user.first_name) {
                        usernameField.value = '@' + user.first_name.toLowerCase().replace(/\s+/g, '');
                    }
                    
                    // Store Telegram data
                    window.telegramUser = {
                        id: user.id,
                        username: usernameField.value,
                        first_name: user.first_name,
                        chat_id: user.id
                    };
                }
            }
        }

        // Toggle username edit
        function toggleUsernameEdit() {
            const field = document.getElementById('telegramUsername');
            const btn = document.getElementById('editToggleBtn');
            
            if (field.readOnly) {
                field.readOnly = false;
                field.focus();
                btn.textContent = '🔒 Lock';
                document.getElementById('usernameHint').textContent = 'You can now edit your username';
            } else {
                field.readOnly = true;
                btn.textContent = '✏️ Edit';
                document.getElementById('usernameHint').textContent = 'Username locked. Click edit to change.';
            }
        }

        // Initialize
        function init() {
            initTelegram();
            
            // Make username editable if Telegram didn't provide one
            const usernameField = document.getElementById('telegramUsername');
            if (!usernameField.value) {
                usernameField.readOnly = false;
                document.getElementById('editToggleBtn').style.display = 'none';
                document.getElementById('usernameHint').textContent = 'Enter your Telegram username';
            }
            
            const savedUser = localStorage.getItem('username');
            const savedId = localStorage.getItem('userId');
            
            if (savedUser && savedId) {
                username = savedUser;
                userId = savedId;
                showLoggedIn();
                loadListings();
            }
        }

        // Register
        async function register() {
            let telegramUsername = document.getElementById('telegramUsername').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const chatId = window.telegramUser?.id || null;
            
            if (!telegramUsername) {
                alert('Please enter Telegram username');
                return;
            }
            
            if (!pin || pin.length < 4 || pin.length > 6) {
                alert('PIN must be 4-6 digits');
                return;
            }
            
            if (!telegramUsername.startsWith('@')) {
                telegramUsername = '@' + telegramUsername;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        telegram_username: telegramUsername,
                        pin: pin,
                        chat_id: chatId
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    userId = data.user_id;
                    username = data.username;
                    
                    localStorage.setItem('userId', userId);
                    localStorage.setItem('username', username);
                    
                    showLoggedIn();
                    loadListings();
                } else {
                    alert('Registration failed: ' + data.message);
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        // Login
        async function login() {
            let telegramUsername = document.getElementById('telegramUsername').value.trim();
            const pin = document.getElementById('pin').value.trim();
            const chatId = window.telegramUser?.id || null;
            
            if (!telegramUsername || !pin) {
                alert('Please enter username and PIN');
                return;
            }
            
            if (!telegramUsername.startsWith('@')) {
                telegramUsername = '@' + telegramUsername;
            }
            
            try {
                const res = await fetch('/api/register', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        telegram_username: telegramUsername,
                        pin: pin,
                        chat_id: chatId
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    userId = data.user_id;
                    username = data.username;
                    isAdmin = data.is_admin;
                    
                    localStorage.setItem('userId', userId);
                    localStorage.setItem('username', username);
                    
                    showLoggedIn();
                    loadListings();
                } else {
                    alert('Login failed: ' + data.message);
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        // Show logged in state
        function showLoggedIn() {
            document.getElementById('loginSection').style.display = 'none';
            document.getElementById('userInfo').style.display = 'flex';
            document.getElementById('tabs').style.display = 'flex';
            document.getElementById('sellBtn').style.display = 'block';
            document.getElementById('displayUsername').textContent = username;
        }

        // Logout
        function logout() {
            localStorage.clear();
            location.reload();
        }

        // Switch tabs
        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            
            event.target.classList.add('active');
            
            if (tab === 'feed') {
                document.getElementById('feed-section').classList.add('active');
                loadListings();
            } else {
                document.getElementById('mylistings-section').classList.add('active');
                loadMyListings();
            }
        }

        // Go to sell page
        function goToSell() {
            window.location.href = '/post';
        }

        // Load listings
        async function loadListings() {
            try {
                const res = await fetch('/api/listings');
                const listings = await res.json();
                
                const grid = document.getElementById('listingsGrid');
                
                if (!listings || listings.length === 0) {
                    grid.innerHTML = '<div class="no-listings">No accounts for sale yet</div>';
                    return;
                }
                
                let html = '';
                listings.forEach(l => {
                    let tradeClass = l.trade_type === 'FOR EXCHANGE' ? 'tag-exchange' : 
                                    (l.trade_type === 'SALE & EXCHANGE' ? 'tag-both' : 'tag-sale');
                    
                    html += `
                        <div class="listing-card" onclick="viewListing(${l.id})">
                            <img src="${l.main_screenshot}" class="squad-image" alt="Squad">
                            <div class="tags-container">
                                <span class="tag tag-price">💰 ${l.price} ETB</span>
                                <span class="tag ${tradeClass}">${l.trade_type}</span>
                                <span class="tag tag-coin">${l.coin_amount > 0 ? `🪙 ${l.coin_amount}` : '🪙 NO COIN'}</span>
                                <span class="tag tag-link">${l.link_type}</span>
                            </div>
                        </div>
                    `;
                });
                
                grid.innerHTML = html;
                
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('listingsGrid').innerHTML = '<div class="no-listings">Error loading listings</div>';
            }
        }

        // Load my listings
        async function loadMyListings() {
            try {
                const res = await fetch('/api/listings');
                const listings = await res.json();
                
                const myListings = listings.filter(l => l.seller === username);
                
                const grid = document.getElementById('myListingsGrid');
                
                if (myListings.length === 0) {
                    grid.innerHTML = '<div class="no-listings">You have no listings</div>';
                    return;
                }
                
                let html = '';
                myListings.forEach(l => {
                    html += `
                        <div class="listing-card" onclick="viewListing(${l.id})">
                            <img src="${l.main_screenshot}" class="squad-image" alt="Squad">
                            <div class="tags-container">
                                <span class="tag tag-price">💰 ${l.price} ETB</span>
                                <span class="tag ${l.trade_type === 'FOR EXCHANGE' ? 'tag-exchange' : 'tag-sale'}">${l.trade_type}</span>
                                <span class="tag tag-coin">${l.coin_amount > 0 ? `🪙 ${l.coin_amount}` : '🪙 NO COIN'}</span>
                            </div>
                        </div>
                    `;
                });
                
                grid.innerHTML = html;
                
            } catch (e) {
                console.error('Error:', e);
                document.getElementById('myListingsGrid').innerHTML = '<div class="no-listings">Error loading listings</div>';
            }
        }

        // View listing
        function viewListing(id) {
            window.location.href = `/detail/${id}`;
        }

        // Initialize
        init();
    </script>
</body>
</html>

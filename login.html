<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Login - eFootball Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #2563eb;
            font-size: 28px;
            font-weight: 700;
        }

        .logo p {
            color: #64748b;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #1e293b;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #e2e8f0;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.3);
        }

        .error-message {
            color: #ef4444;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #64748b;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #2563eb;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>👑 ADMIN LOGIN</h1>
            <p>eFootball Marketplace</p>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="off">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password">
        </div>

        <button class="login-btn" onclick="handleLogin()" id="loginBtn">LOGIN</button>
        <div id="loading" class="loading">Authenticating...</div>
        <div id="errorMsg" class="error-message"></div>

        <div class="back-link">
            <a href="/">← Back to Marketplace</a>
        </div>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            
            errorDiv.textContent = '';
            
            if (!username || !password) {
                errorDiv.textContent = 'Please enter both username and password';
                return;
            }
            
            loginBtn.disabled = true;
            loading.style.display = 'block';
            
            // Hardcoded credentials as requested
            setTimeout(() => {
                if (username === 'awnowner' && password === '12604') {
                    localStorage.setItem('adminUser', username);
                    localStorage.setItem('adminRole', 'owner');
                    window.location.href = '/admin';
                } else if (username === 'awnadmin' && password === '11512') {
                    localStorage.setItem('adminUser', username);
                    localStorage.setItem('adminRole', 'admin');
                    window.location.href = '/admin';
                } else {
                    errorDiv.textContent = 'Invalid username or password';
                    loginBtn.disabled = false;
                    loading.style.display = 'none';
                }
            }, 800);
        }
        
        function checkLogin() {
            const adminUser = localStorage.getItem('adminUser');
            const adminRole = localStorage.getItem('adminRole');
            
            if (adminUser && adminRole) {
                window.location.href = '/admin';
            }
        }
        
        checkLogin();
    </script>
</body>
</html>

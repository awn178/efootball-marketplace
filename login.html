<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Admin Login - eFootball Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #0a0c10;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Dark Mode Login Container */
        .login-container {
            background: #1a1e24;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
            border: 1px solid #2d3748;
            animation: slideIn 0.5s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #60a5fa;
            font-size: 26px;
            font-weight: 700;
        }

        .logo p {
            color: #9ca3af;
            font-size: 14px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #9ca3af;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #4b5563;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.3s ease;
            background: #2d3748;
            color: #e5e7eb;
        }

        .form-control:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.1);
        }

        .form-control::placeholder {
            color: #6b7280;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .login-btn:hover:not(:disabled) {
            background: #1d4ed8;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(37,99,235,0.3);
        }

        .login-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }

        .error-message {
            color: #ef4444;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #9ca3af;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.3s ease;
        }

        .back-link a:hover {
            color: #60a5fa;
        }

        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #60a5fa;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .login-container {
                padding: 30px 20px;
            }

            .logo h1 {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="logo">
            <h1>👑 ADMIN LOGIN</h1>
            <p>eFootball Marketplace</p>
        </div>

        <div class="form-group">
            <label>Username</label>
            <input type="text" id="username" class="form-control" placeholder="Enter username" autocomplete="off">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" class="form-control" placeholder="Enter password">
        </div>

        <button class="login-btn" onclick="handleLogin()" id="loginBtn">LOGIN</button>
        <div id="loading" class="loading">Authenticating...</div>
        <div id="errorMsg" class="error-message"></div>

        <div class="back-link">
            <a href="/">← Back to Marketplace</a>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            
            errorDiv.textContent = '';
            
            if (!username || !password) {
                errorDiv.textContent = 'Please enter both username and password';
                return;
            }
            
            loginBtn.disabled = true;
            loading.style.display = 'block';
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({username, password})
                });
                
                const data = await res.json();
                
                if (data.success) {
                    localStorage.setItem('adminUser', username);
                    localStorage.setItem('adminRole', data.role);
                    window.location.href = '/admin';
                } else {
                    errorDiv.textContent = data.message || 'Invalid credentials';
                    loginBtn.disabled = false;
                    loading.style.display = 'none';
                }
            } catch (e) {
                errorDiv.textContent = 'Error: ' + e.message;
                loginBtn.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        // Check if already logged in
        function checkLogin() {
            const adminUser = localStorage.getItem('adminUser');
            const adminRole = localStorage.getItem('adminRole');
            
            if (adminUser && adminRole) {
                window.location.href = '/admin';
            }
        }
        
        checkLogin();

        // Allow Enter key to submit
        document.getElementById('password').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
</body>
</html>

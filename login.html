<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Login - eFootball Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            color: #f3f4f6;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #1f2937;
            padding: 40px 30px;
            border-radius: 20px;
            border: 1px solid #374151;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
        }
        .login-container h2 {
            color: #2563eb;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: 700;
        }
        .login-input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #374151;
            border: 1px solid #4b5563;
            color: #f3f4f6;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 15px;
            transition: all 0.2s;
        }
        .login-input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.2);
        }
        .login-btn {
            width: 100%;
            padding: 14px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 16px;
            margin-top: 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .login-btn:hover {
            background: #1d4ed8;
        }
        .login-btn:disabled {
            background: #4b5563;
            cursor: not-allowed;
        }
        .error-message {
            color: #ef4444;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
        .info-text {
            color: #9ca3af;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }
        .back-link {
            color: #10b981;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-size: 14px;
            transition: color 0.2s;
        }
        .back-link:hover {
            color: #059669;
            text-decoration: underline;
        }
        .loading {
            display: none;
            text-align: center;
            margin-top: 15px;
            color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>
            <span>👑</span> ADMIN LOGIN
        </h2>
        
        <input type="text" id="username" class="login-input" placeholder="Telegram Username (with @)" autocomplete="off">
        <input type="password" id="password" class="login-input" placeholder="PIN">
        
        <button class="login-btn" onclick="handleLogin()" id="loginBtn">LOGIN</button>
        <div id="loading" class="loading">Authenticating...</div>
        
        <div id="errorMsg" class="error-message"></div>
        
        <div class="info-text">
            <div>Use your admin credentials</div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/" class="back-link">← Back to Marketplace</a>
        </div>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            const loginBtn = document.getElementById('loginBtn');
            const loading = document.getElementById('loading');
            
            // Clear previous error
            errorDiv.textContent = '';
            
            // Check if fields are empty
            if (!username || !password) {
                errorDiv.textContent = 'Please enter both username and PIN';
                return;
            }
            
            // Format username
            let formattedUsername = username;
            if (!formattedUsername.startsWith('@')) {
                formattedUsername = '@' + formattedUsername;
            }
            
            // Disable button and show loading
            loginBtn.disabled = true;
            loading.style.display = 'block';
            
            try {
                const res = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        username: formattedUsername,
                        password: password
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    // Store admin info
                    localStorage.setItem('adminUser', data.username);
                    localStorage.setItem('adminRole', data.role);
                    window.location.href = '/admin';
                } else {
                    errorDiv.textContent = data.message || 'Invalid credentials';
                    loginBtn.disabled = false;
                    loading.style.display = 'none';
                }
            } catch (e) {
                errorDiv.textContent = 'Connection error';
                loginBtn.disabled = false;
                loading.style.display = 'none';
            }
        }
        
        // Check if already logged in
        function checkLogin() {
            const adminUser = localStorage.getItem('adminUser');
            const adminRole = localStorage.getItem('adminRole');
            
            if (adminUser && adminRole) {
                window.location.href = '/admin';
            }
        }
        
        // Run check on page load
        checkLogin();
    </script>
</body>
</html>

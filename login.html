<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Login - eFootball Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0f1e 0%, #1a1f2e 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            background: #16213e;
            padding: 40px 30px;
            border-radius: 20px;
            border: 2px solid #4CAF50;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-container h2 {
            color: #4CAF50;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .login-input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            background: #1e2a3a;
            border: 1px solid #2a3a5a;
            color: white;
            border-radius: 10px;
            font-family: 'Poppins', sans-serif;
            font-size: 16px;
        }
        .login-input:focus {
            outline: none;
            border-color: #4CAF50;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 18px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .login-btn:hover {
            background: #45a049;
            transform: scale(1.02);
        }
        .error-message {
            color: #f44336;
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            min-height: 20px;
        }
        .info-text {
            color: #8892b0;
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
        }
        .back-link {
            color: #4CAF50;
            text-decoration: none;
            display: inline-block;
            margin-top: 15px;
            font-size: 14px;
        }
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>
            <span>👑</span> ADMIN LOGIN
        </h2>
        
        <input type="text" id="username" class="login-input" placeholder="Username" autocomplete="off">
        <input type="password" id="password" class="login-input" placeholder="Password">
        
        <button class="login-btn" onclick="handleLogin()">LOGIN</button>
        
        <div id="errorMsg" class="error-message"></div>
        
        <div class="info-text">
            <div>Owner: awnowner</div>
            <div>Admin: awnadmin</div>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/" class="back-link">← Back to Marketplace</a>
        </div>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorDiv = document.getElementById('errorMsg');
            
            // Clear previous error
            errorDiv.textContent = '';
            
            // Check if fields are empty
            if (!username || !password) {
                errorDiv.textContent = 'Please enter both username and password';
                return;
            }
            
            // Check credentials
            if (username === 'awnowner' && password === '12604') {
                // Owner login successful
                localStorage.setItem('adminUser', username);
                localStorage.setItem('adminRole', 'owner');
                window.location.href = '/admin';
                return;
            }
            
            if (username === 'awnadmin' && password === '11512') {
                // Admin login successful
                localStorage.setItem('adminUser', username);
                localStorage.setItem('adminRole', 'admin');
                window.location.href = '/admin';
                return;
            }
            
            // Invalid credentials
            errorDiv.textContent = 'Invalid username or password';
        }
        
        // Check if already logged in
        function checkLogin() {
            const adminUser = localStorage.getItem('adminUser');
            const adminRole = localStorage.getItem('adminRole');
            
            if (adminUser && adminRole) {
                window.location.href = '/admin';
            }
        }
        
        // Run check on page load
        checkLogin();
    </script>
</body>
</html>

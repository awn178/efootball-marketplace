<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Sell Account - eFootball Marketplace</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #111827 0%, #1f2937 100%);
            color: #f3f4f6;
            min-height: 100vh;
        }
        header {
            background: #1f2937;
            padding: 16px;
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid #374151;
        }
        .container {
            padding: 16px;
            max-width: 600px;
            margin: 0 auto;
        }
        .back-btn {
            background: #374151;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .form-card {
            background: #1f2937;
            border-radius: 16px;
            padding: 24px;
            border: 1px solid #374151;
        }
        .form-title {
            color: #2563eb;
            font-size: 18px;
            margin-bottom: 24px;
            font-weight: 600;
        }
        .input-group {
            margin-bottom: 20px;
        }
        .input-group label {
            display: block;
            color: #9ca3af;
            font-size: 13px;
            margin-bottom: 8px;
        }
        .form-input {
            width: 100%;
            padding: 12px;
            background: #374151;
            border: 1px solid #4b5563;
            color: white;
            border-radius: 8px;
        }
        .form-input:focus {
            outline: none;
            border-color: #2563eb;
        }
        .form-input[readonly] {
            background: #2d3748;
            color: #10b981;
        }
        .upload-area {
            background: #374151;
            border: 2px dashed #4b5563;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            cursor: pointer;
        }
        .upload-area:hover {
            border-color: #2563eb;
        }
        .preview-image {
            width: 100%;
            max-height: 200px;
            object-fit: contain;
            margin-top: 10px;
            border-radius: 8px;
        }
        .radio-group {
            display: flex;
            gap: 15px;
            background: #374151;
            padding: 12px;
            border-radius: 8px;
        }
        .player-row {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .player-row input {
            flex: 1;
        }
        .remove-player {
            background: #ef4444;
            color: white;
            border: none;
            width: 40px;
            border-radius: 8px;
            cursor: pointer;
        }
        .add-player {
            background: #2563eb;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 8px;
        }
        .skills-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            background: #374151;
            padding: 12px;
            border-radius: 8px;
            max-height: 200px;
            overflow-y: auto;
        }
        .skill-checkbox {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
        }
        .submit-btn {
            background: #10b981;
            color: white;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 8px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .username-edit {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
        }
        .edit-toggle {
            background: #374151;
            border: 1px solid #4b5563;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <header>
        🛒 SELL ACCOUNT
    </header>

    <div class="container">
        <button class="back-btn" onclick="goBack()">← BACK</button>

        <div class="form-card">
            <div class="form-title">📝 LIST YOUR ACCOUNT</div>

            <!-- Seller Username -->
            <div class="input-group">
                <label>YOUR USERNAME</label>
                <div class="username-edit">
                    <input type="text" id="sellerUsername" class="form-input" readonly>
                    <button class="edit-toggle" onclick="toggleEdit()" id="editBtn">✏️ Edit</button>
                </div>
            </div>

            <!-- Main Squad -->
            <div class="input-group">
                <label>MAIN SQUAD *</label>
                <div class="upload-area" onclick="document.getElementById('mainSquad').click()">
                    📸 Click to upload
                </div>
                <input type="file" id="mainSquad" accept="image/*" style="display: none;" onchange="previewImage(this, 'mainPreview')">
                <img id="mainPreview" class="preview-image" style="display: none;">
            </div>

            <!-- Overbench -->
            <div class="input-group">
                <label>OVERBENCH *</label>
                <div class="upload-area" onclick="document.getElementById('overbench').click()">
                    📸 Click to upload
                </div>
                <input type="file" id="overbench" accept="image/*" style="display: none;" onchange="previewImage(this, 'overPreview')">
                <img id="overPreview" class="preview-image" style="display: none;">
            </div>

            <!-- Price -->
            <div class="input-group">
                <label>PRICE (ETB) *</label>
                <input type="number" id="price" class="form-input" min="0">
            </div>

            <!-- Coins -->
            <div class="input-group">
                <label>COINS</label>
                <input type="number" id="coins" class="form-input" value="0" min="0">
            </div>

            <!-- Trade Type -->
            <div class="input-group">
                <label>TRADE TYPE *</label>
                <div class="radio-group">
                    <label><input type="radio" name="tradeType" value="FOR SALE" checked> 💰 SALE</label>
                    <label><input type="radio" name="tradeType" value="FOR EXCHANGE"> 🔄 EXCHANGE</label>
                    <label><input type="radio" name="tradeType" value="SALE & EXCHANGE"> 🔄💰 BOTH</label>
                </div>
            </div>

            <!-- Link Type -->
            <div class="input-group">
                <label>LINK TYPE *</label>
                <div class="radio-group">
                    <label><input type="radio" name="linkType" value="KONAMI LINK" checked> 🔗 KONAMI</label>
                    <label><input type="radio" name="linkType" value="GOOGLE LINK"> 🔗 GOOGLE</label>
                </div>
            </div>

            <!-- Featured Players -->
            <div class="input-group">
                <label>FEATURED PLAYERS (Max 4) *</label>
                <div id="playersContainer">
                    <div class="player-row">
                        <input type="text" class="player-input" placeholder="Player name">
                    </div>
                </div>
                <button class="add-player" onclick="addPlayer()">➕ ADD PLAYER</button>
                <p id="playerLimit" style="color: #f59e0b; font-size: 12px; display: none;">Maximum 4 players</p>
            </div>

            <!-- Skills -->
            <div class="input-group">
                <label>SPECIAL SKILLS</label>
                <div id="skillsContainer" class="skills-grid">
                    <div class="loading">Loading skills...</div>
                </div>
            </div>

            <!-- Submit -->
            <button class="submit-btn" onclick="submitListing()" id="submitBtn">✅ POST LISTING</button>
        </div>
    </div>

    <script>
        let tg = window.Telegram?.WebApp;
        let username = localStorage.getItem('username');
        let playerCount = 1;
        let mainBase64 = null;
        let overBase64 = null;

        // Redirect if not logged in
        if (!username) {
            window.location.href = '/';
        }

        // Initialize Telegram
        if (tg) {
            tg.ready();
            const user = tg.initDataUnsafe?.user;
            if (user && user.username) {
                document.getElementById('sellerUsername').value = '@' + user.username;
            } else {
                document.getElementById('sellerUsername').value = username;
            }
        } else {
            document.getElementById('sellerUsername').value = username;
        }

        // Toggle edit
        function toggleEdit() {
            const field = document.getElementById('sellerUsername');
            const btn = document.getElementById('editBtn');
            
            if (field.readOnly) {
                field.readOnly = false;
                btn.textContent = '🔒 Lock';
            } else {
                field.readOnly = true;
                btn.textContent = '✏️ Edit';
            }
        }

        // Preview image
        function previewImage(input, previewId) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById(previewId).src = e.target.result;
                    document.getElementById(previewId).style.display = 'block';
                    
                    if (previewId === 'mainPreview') mainBase64 = e.target.result;
                    else overBase64 = e.target.result;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // Add player
        function addPlayer() {
            if (playerCount >= 4) {
                document.getElementById('playerLimit').style.display = 'block';
                return;
            }
            
            const container = document.getElementById('playersContainer');
            const row = document.createElement('div');
            row.className = 'player-row';
            row.innerHTML = `
                <input type="text" class="player-input" placeholder="Player name">
                <button class="remove-player" onclick="this.parentElement.remove(); playerCount--;">✖</button>
            `;
            container.appendChild(row);
            playerCount++;
        }

        // Load skills
        async function loadSkills() {
            try {
                const res = await fetch('/api/skills');
                const skills = await res.json();
                
                let html = '';
                skills.forEach(s => {
                    html += `
                        <label class="skill-checkbox">
                            <input type="checkbox" value="${s}">
                            <span>✨ ${s}</span>
                        </label>
                    `;
                });
                document.getElementById('skillsContainer').innerHTML = html;
            } catch (e) {}
        }

        // Submit listing
        async function submitListing() {
            const seller = document.getElementById('sellerUsername').value;
            const price = document.getElementById('price').value;
            const coins = document.getElementById('coins').value;
            const tradeType = document.querySelector('input[name="tradeType"]:checked').value;
            const linkType = document.querySelector('input[name="linkType"]:checked').value;
            
            // Get featured players
            const players = [];
            document.querySelectorAll('.player-input').forEach(input => {
                if (input.value.trim()) players.push(input.value.trim());
            });
            
            // Get selected skills
            const skills = [];
            document.querySelectorAll('.skill-checkbox input:checked').forEach(cb => {
                skills.push(cb.value);
            });
            
            // Validate
            if (!mainBase64 || !overBase64) {
                alert('Please upload both screenshots');
                return;
            }
            if (!price) {
                alert('Please enter price');
                return;
            }
            if (players.length === 0) {
                alert('Please enter at least one featured player');
                return;
            }
            
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.textContent = 'POSTING...';
            
            try {
                const res = await fetch('/api/create_listing', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        seller_username: seller,
                        main_screenshot: mainBase64,
                        overbench_screenshot: overBase64,
                        price: parseInt(price),
                        coin_amount: parseInt(coins),
                        trade_type: tradeType,
                        link_type: linkType,
                        featured_players: players,
                        special_skills: skills
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    alert('✅ Listing posted!');
                    window.location.href = '/';
                } else {
                    alert('Error: ' + data.message);
                    submitBtn.disabled = false;
                    submitBtn.textContent = '✅ POST LISTING';
                }
            } catch (e) {
                alert('Error: ' + e.message);
                submitBtn.disabled = false;
                submitBtn.textContent = '✅ POST LISTING';
            }
        }

        function goBack() {
            window.location.href = '/';
        }

        // Load skills on page load
        loadSkills();
    </script>
</body>
</html>
